<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smash & Co. | Menú Interactivo 3D</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Model Viewer de Google -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#111827',
                            red: '#DC2626',
                            yellow: '#F59E0B',
                            light: '#F3F4F6'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Bebas Neue', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap');
        body { background-color: #F3F4F6; }
        
        model-viewer::part(default-ar-button) {
            background-color: #DC2626;
            color: white;
            border-radius: 9999px;
            padding: 0.75rem 1.5rem;
            font-family: 'Inter', sans-serif;
            font-weight: bold;
            border: none;
            position: absolute;
            bottom: 16px;
            right: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="font-sans text-brand-dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={`shrink-0 ${className}`}></i>;
        };

        function App() {
            return (
                <div className="min-h-screen flex flex-col">
                    
                    <nav className="bg-brand-dark text-white px-6 py-4 flex items-center justify-between sticky top-0 z-50 shadow-md">
                        <div className="flex items-center gap-2">
                            <Icon name="flame" className="text-brand-yellow" size={28} />
                            <span className="font-display text-2xl tracking-wider pt-1">SMASH & CO.</span>
                        </div>
                        <button className="bg-brand-red hover:bg-red-700 px-5 py-2 rounded-full text-sm font-bold transition-colors">
                            Pedir Ahora
                        </button>
                    </nav>

                    <header className="bg-brand-dark text-white py-16 px-6 text-center border-b-4 border-brand-yellow relative overflow-hidden">
                        <div className="absolute inset-0 opacity-10" style={{backgroundImage: 'radial-gradient(#fff 1px, transparent 1px)', backgroundSize: '20px 20px'}}></div>
                        <div className="relative z-10 max-w-2xl mx-auto">
                            <span className="text-brand-yellow font-bold uppercase tracking-widest text-xs mb-4 block">Experiencia Real 3D</span>
                            <h1 className="font-display text-6xl md:text-8xl text-white leading-none mb-4">
                                LA MEJOR <span className="text-brand-red">VISTA</span>.<br/> EL MEJOR SABOR.
                            </h1>
                        </div>
                    </header>

                    <main className="flex-grow py-12 px-6 max-w-7xl mx-auto w-full">
                        
                        <div className="mb-10 flex items-center justify-between border-b-2 border-gray-200 pb-4">
                            <h2 className="font-display text-4xl text-brand-dark">Platillo Destacado</h2>
                        </div>

                        <div className="bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col lg:flex-row border border-gray-100">
                            
                            {/* CONTENEDOR 3D MEJORADO PARA REALITY CAPTURE */}
                            <div className="w-full lg:w-3/5 bg-[#f8f8f8] relative min-h-[500px] lg:min-h-[600px] flex items-center justify-center">
                                
                                <div className="absolute top-4 left-4 z-10 bg-white/90 backdrop-blur px-3 py-1.5 rounded-full text-[10px] font-bold text-gray-500 flex items-center gap-2 shadow-sm uppercase tracking-tighter">
                                    <Icon name="move-3d" size={14} className="text-brand-red" /> Gira el platillo
                                </div>

                                {/* AQUÍ ESTÁ EL TRUCO: camera-target="auto auto auto" y disable-zoom */}
                                <model-viewer 
                                    src="model.glb" 
                                    alt="Hamburguesa 3D" 
                                    auto-rotate 
                                    camera-controls 
                                    disable-zoom
                                    camera-target="auto auto auto"
                                    bounds="tight"
                                    ar
                                    shadow-intensity="1.5"
                                    exposure="1"
                                    className="w-full h-full outline-none cursor-grab active:cursor-grabbing"
                                >
                                </model-viewer>
                            </div>

                            <div className="w-full lg:w-2/5 p-8 lg:p-12 flex flex-col justify-center">
                                <h3 className="font-display text-5xl mb-2 text-brand-dark">La "Bufalo" Special</h3>
                                <p className="text-3xl font-bold text-brand-red mb-6">$145.00</p>
                                
                                <p className="text-gray-600 mb-8 leading-relaxed italic">
                                    "Diseñada para los que no se conforman con una foto. Explora cada ángulo de nuestro pan artesanal y carne premium."
                                </p>

                                <button className="w-full bg-brand-dark hover:bg-black text-white font-bold py-5 rounded-2xl flex items-center justify-center gap-3 transition-all hover:scale-[1.02] shadow-lg">
                                    <Icon name="shopping-cart" size={20} className="text-brand-yellow" /> Ordenar en 3D
                                </button>
                            </div>
                        </div>
                    </main>

                    <footer className="bg-brand-dark text-gray-500 py-10 text-center mt-auto border-t border-gray-800">
                        <span className="font-display text-xl text-white tracking-widest pt-1">SMASH & CO.</span>
                        <p className="text-[10px] mt-2 uppercase tracking-[0.3em]">Xalapa • Tecnología y Sabor</p>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
